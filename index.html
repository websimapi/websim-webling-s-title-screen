<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Webling's Title Screen</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="title-screen" class="container">
        <!-- Top Logo -->
        <header class="logo-container">
            <img src="/webling_idle.png" alt="Webling Idle Logo" class="main-logo">
        </header>

        <!-- Main Buttons Section -->
        <main class="interaction-area">
            <div class="button-row first-row">
                <button class="game-btn"><img src="/one_player_button.png" alt="1 Player"></button>
                <button class="game-btn"><img src="/new_level_button.png" alt="New Level"></button>
                <button class="game-btn"><img src="/music_button.png" alt="Music"></button>
                <button class="game-btn"><img src="/fun_button.png" alt="Fun"></button>
            </div>
            
            <div class="button-row second-row">
                <button class="game-btn"><img src="/exit_button.png" alt="Exit"></button>
                <button class="game-btn"><img src="/demo_button.png" alt="Demo"></button>
            </div>
        </main>

        <!-- Copyright Info -->
        <section class="copyright-info">
            <p class="blue-text">(C) VI67VII Webswim Ltd</p>
            <p class="blue-text">A DMCA Design Gnome</p>
        </section>

        <!-- Yellow Footer -->
        <footer class="bottom-footer">
            <div class="footer-content">
                Promtinations By API
            </div>
        </footer>
    </div>

    <!-- Game Scene -->
    <div id="game-scene" class="game-container hidden">
        <canvas id="game-canvas"></canvas>
    </div>

    <script type="module" src="app.js"></script>
<script defer src="https://static.cloudflareinsights.com/beacon.min.js/v8c78df7c7c0f484497ecbca7046644da1771523124516" integrity="sha512-8DS7rgIrAmghBFwoOTujcf6D9rXvH8xm8JQ1Ja01h9QX8EzXldiszufYa4IFfKdLUKTTrnSFXLDkUEOTrZQ8Qg==" data-cf-beacon='{"version":"2024.11.0","token":"4c6229722a6346bc8eb5cb0e5eae5d41","server_timing":{"name":{"cfCacheStatus":true,"cfEdge":true,"cfExtPri":true,"cfL4":true,"cfOrigin":true,"cfSpeedBrain":true},"location_startswith":null}}' crossorigin="anonymous"></script>
</body>
</html>
